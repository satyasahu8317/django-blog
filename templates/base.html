<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Canvas | Personal Blog{% endblock %}</title>
    <!-- Tailwind Play CDN -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        // Tailwind Dark Mode Config
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
    <meta name="description" content="{% block meta_description %}Read amazing stories on Digital Canvas.{% endblock %}">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Digital Canvas{% endblock %}">
    <meta property="og:description" content="{% block og_description %}A modern blog for deep thinkers.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://digitalcanvas.com/static/og-image.jpg{% endblock %}">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 selection:bg-indigo-100 min-h-screen">

    <!-- Premium Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="{% url 'posts:post_list' %}" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
                DigitalCanvas
            </a>

            <div class="flex items-center gap-4">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:scale-110 transition-transform">
                    <span id="sun-icon" class="hidden">☀️</span>
                    <span id="moon-icon">🌙</span>
                </button>

                {% if user.is_authenticated %}
                    <a href="{% url 'posts:post_create' %}" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400">+ New</a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm text-slate-500 hover:text-red-500 transition-colors">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-indigo-700 shadow-lg shadow-indigo-200 dark:shadow-none">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-800 py-12 text-center text-slate-400 text-sm">
        &copy; 2024 DigitalCanvas. Built with Django & Tailwind.
    </footer>

    <!-- Dark Mode Script -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const html = document.documentElement;

        // Check for saved theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            html.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) {
                localStorage.theme = 'dark';
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                localStorage.theme = 'light';
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
