<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Canvas | Personal Blog{% endblock %}</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-indigo-100">

    <!-- Premium Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="{% url 'posts:post_list' %}" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
                DigitalCanvas
            </a>

            <div class="flex items-center gap-6">
                <form action="{% url 'posts:search' %}" method="get" class="hidden md:flex relative">
                    <input type="text" name="q" placeholder="Search..." class="bg-slate-100 px-4 py-1.5 rounded-full text-sm border-none focus:ring-2 focus:ring-indigo-500 w-48 transition-all focus:w-64">
                </form>

                {% if user.is_authenticated %}
                    <a href="{% url 'posts:post_create' %}" class="text-sm font-semibold text-indigo-600">+ New Post</a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-sm text-slate-500 hover:text-red-500 transition-colors">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-slate-200 py-12 text-center text-slate-400 text-sm">
        &copy; 2024 DigitalCanvas. Built with Django & Tailwind.
    </footer>

</body>
</html>
