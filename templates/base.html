<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Digital Blog{% endblock %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .post {
            margin-bottom: 40px;
        }

        .date {
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <header
        style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
        <div>
            <h1 style="margin: 0;"><a href="{% url 'posts:post_list' %}"
                    style="color: inherit; text-decoration: none;">My Digital Blog</a></h1>
        </div>

        <div style="text-align: right;">
            {% if user.is_authenticated %}
            <span>Welcome, <b>{{ user.username }}</b>!</span> |
            <a href="{% url 'posts:post_create' %}" style="margin-right: 10px; color: #27ae60; font-weight: bold;">+ New Post</a>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #3498db; cursor: pointer; text-decoration: underline; padding: 0; font-size: 1em;">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </header>
    <form action="{% url 'posts:search' %}" method="get" style="margin-bottom: 20px;">
        <input type="text" name="q" placeholder="Search posts..." required
            style="padding: 8px; width: 250px; border-radius: 4px; border: 1px solid #ccc;">
        <button type="submit"
            style="padding: 8px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px;">Search</button>
    </form>
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
