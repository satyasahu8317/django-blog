{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Login to My Blog</h2>

    <!-- ADD THIS BLOCK FOR ERRORS -->
    {% if form.errors %}
    <p style="color: red;">Your username and password didn't match. Please try again.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}"> <!-- Add this line -->
        <button type="submit" style="width: 100%; background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Login</button>
    </form>

</div>
{% endblock %}
